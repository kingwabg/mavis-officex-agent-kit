      - 시작: `git -C /tmp/wt/p2-childdocs status --short` + `git rev-parse HEAD` 1줄 보고
      - 기존 `lib/child-documents.ts` (203줄) → `lib/features/child-documents/` 모듈 분리:
        - `lib/features/child-documents/types.ts`   (Type 정의: ChildDocumentCategory, TEXT_CATEGORIES, ChildDocument, 등 모든 type/export type)
        - `lib/features/child-documents/data.ts`   (mock 데이터/시드 — 없으면 빈 stub)
        - `lib/features/child-documents/store.ts`  (localStorage I/O: readLS/writeLS 패턴)
        - `lib/features/child-documents/utils.ts`  (isTextCategory, 헬퍼 함수)
        - `lib/features/child-documents/index.ts`  (public re-export: `export * from './types'; export * from './utils'; ...`)
        - `lib/child-documents.ts` shim — `export * from './features/child-documents'` + `@deprecated` 주석 (옛 import 호환성 100%)
      - 절차:
        1. 옛 `lib/child-documents.ts` 의 모든 export (type + function) 목록화
        2. 각 파일에 의미별로 분배 (type → types.ts, function → utils.ts, mock → data.ts, store → store.ts)
        3. `index.ts` 에서 모든 public re-export
        4. shim 작성 (`@deprecated` 주석 + `export *`)
        5. 옛 import 경로 사용처 grep → 영향받는 파일 0건이면 (또는 모두 새 경로로 OK이면) OK

