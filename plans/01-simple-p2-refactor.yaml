      - `cd /tmp/wt/p2-childdocs && npm run typecheck` 0 errors
      - `git -C /tmp/wt/p2-childdocs diff --stat` — 새 파일 5개, 수정 1개 (shim), 삭제 0건
      - 파일별 (전 → 후) 줄 수 비교표

      [외부 동작 보존 — 최우선]
      - 라우팅 변화 없음
      - 데이터 시맨틱 변화 없음 (함수 시그니처 동일)
      - 옛 `@/lib/child-documents` import 경로 그대로 동작 (shim 통해서)

      [강제]
      - 다른 파일 절대 손대지 말 것
      - main worktree (`/tmp/sc-`) 와 다른 wt-p2-* 워크트리 절대 건들지 말 것
      - 부수효과 금지 (별도 기능 추가 X)
      - commit 하지 말 것 (owner가 따로 처리)

      [Stop when 본인 agent.md 형식]
      - 5개 신규 + 1개 shim
      - typecheck 0 errors
      - 옛 import 호환성 1줄 보고
      - 파일별 줄 수 비교표
      - parent 보고 done
